<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay - 300</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f4f7f6; margin: 0; }
        .top-banner { background: #e2136e; color: white; padding: 25px; text-align: center; position: relative; transition: 0.3s; }
        .container { background: white; border-radius: 25px 25px 0 0; margin-top: -20px; padding: 20px; min-height: 80vh; }
        .method-selector { display: flex; gap: 10px; margin: 20px 0; }
        .method-card { flex: 1; border: 1px solid #ddd; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .bkash-active { border: 2px solid #e2136e; background: #fff0f6; color: #e2136e; }
        .nagad-active { border: 2px solid #f15a22; background: #fff5f0; color: #f15a22; }
        .input-field { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; margin-top: 10px; box-sizing: border-box; outline: none; }
        .submit-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; margin-top: 20px; background: #e0e0e0; color: #999; transition: 0.3s; }
        .submit-btn.active { background: #e2136e; color: white; cursor: pointer; }
        .copy-btn { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }

        #toast {
            visibility: hidden; min-width: 220px; background-color: #333; color: #fff; text-align: center;
            border-radius: 50px; padding: 12px 24px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-size: 14px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; gap: 10px; opacity: 0; transition: opacity 0.3s, bottom 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

    <div id="toast">
        <span>✅</span>
        <span>নম্বরটি কপি করা হয়েছে</span>
    </div>

    <div class="top-banner" id="headerBg">
        <div style="font-size: 14px; opacity: 0.9;">পরিশোধযোগ্য পরিমাণ</div>
        <div style="font-size: 32px; font-weight: bold;">৳ 300.00</div>
    </div>

    <div class="container">
        <div class="method-selector">
            <div class="method-card bkash-active" id="bkashBtn" onclick="updateMethod('bKash', '01925818216', '#e2136e', this)"><b>bKash</b></div>
            <div class="method-card" id="nagadBtn" onclick="updateMethod('Nagad', '01747745554', '#f15a22', this)"><b>Nagad</b></div>
        </div>

        <p id="method-title">এই bKash নাম্বারটিতে 'স্যান্ড মানি' করুন:</p>
        <div style="background: #eee; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
            <b id="wallet-no" style="font-size: 19px; letter-spacing: 1px;">01925818216</b>
            <button class="copy-btn" onclick="copyNo()">কপি</button>
        </div>

        <input type="text" id="trxInput" class="input-field" placeholder="TrxID প্রদান করুন" oninput="validate()">
        <button id="submitBtn" class="submit-btn" onclick="submitToAdmin()">জমা দিন</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyANWxCdWbcybuY60iSiNYtFfzY8zHKQCmE",
            authDomain: "biddut-grid-2a476.firebaseapp.com",
            databaseURL: "https://biddut-grid-2a476-default-rtdb.firebaseio.com",
            projectId: "biddut-grid-2a476",
            appId: "1:598209087772:web:400dae852569f1b27a52d9"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedMethod = "bKash"; 
        let themeColor = "#e2136e";
        const userPhone = localStorage.getItem('userPhone'); // মাস্টার সেশনের সাথে মিল রাখা হয়েছে

        function updateMethod(name, num, color, el) {
            selectedMethod = name; 
            themeColor = color;
            document.getElementById('bkashBtn').className = 'method-card';
            document.getElementById('nagadBtn').className = 'method-card';
            el.classList.add(name === 'bKash' ? 'bkash-active' : 'nagad-active');
            document.getElementById('headerBg').style.backgroundColor = color;
            document.getElementById('wallet-no').innerText = num;
            document.getElementById('method-title').innerText = `এই ${name} নাম্বারটিতে 'স্যান্ড মানি' করুন:`;
            validate();
        }

        function copyNo() {
            const no = document.getElementById('wallet-no').innerText;
            navigator.clipboard.writeText(no).then(() => { showToast(); });
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.style.backgroundColor = themeColor;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 2500);
        }

        function validate() {
            const val = document.getElementById('trxInput').value;
            const btn = document.getElementById('submitBtn');
            if(val.length > 5) { 
                btn.classList.add('active'); 
                btn.style.backgroundColor = themeColor; 
            } else { 
                btn.classList.remove('active'); 
                btn.style.backgroundColor = "#e0e0e0"; 
            }
        }

        function submitToAdmin() {
            const trx = document.getElementById('trxInput').value;
            if(!userPhone) { alert("দয়া করে লগইন করুন!"); return; }
            if(trx.length < 5) return;

            // অ্যাডমিন প্যানেলে deposits নোডে পাঠানো (মাস্টার সিঙ্ক)
            db.ref('deposits').push({
                phone: userPhone,
                amount: 300,
                txnId: trx,
                method: selectedMethod,
                status: "Pending",
                time: new Date().toLocaleString()
            }).then(() => {
                alert("সাবমিট সফল হয়েছে! অ্যাডমিন চেক করে ব্যালেন্স যোগ করে দিবে।");
                window.location.href = "profile.html";
            }).catch((err) => { alert("ত্রুটি: " + err.message); });
        }
    </script>
</body>
</html>
