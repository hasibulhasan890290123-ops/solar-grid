<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার বিদ্যুৎ গ্রিড প্রোফাইল</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #fcc419; 
            --electric-blue: #007bff;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-color: #eee;
            --border-color: #333;
        }
        
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: var(--dark-bg); 
            color: var(--text-color); 
            margin: 0; 
            padding-bottom: 80px; 
            background-image: radial-gradient(circle at 50% -20%, #1a3a5a 0%, var(--dark-bg) 60%);
        }
        
        .header { 
            text-align: center; 
            padding: 18px; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--gold); 
            position: sticky; 
            top: 0; 
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(5px);
            z-index: 100; 
            text-shadow: 0 0 10px rgba(252, 196, 25, 0.5);
        }

        .user-card { 
            background: var(--card-bg); 
            padding: 20px; 
            margin: 15px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            display: flex; 
            align-items: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        
        .logo-box { 
            width: 80px; 
            height: 80px;
            margin-right: 25px; 
            position: relative; 
            z-index: 2; 
            background: #111;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.5);
        }
        .logo-box img { 
            width: 50px; 
            height: 50px; 
            filter: drop-shadow(0 0 10px var(--electric-blue)) sepia(1) hue-rotate(200deg);
        }
        
        .balance-info { flex: 1; position: relative; z-index: 2; }
        .balance-label { font-size: 13px; color: #aaa; text-transform: uppercase; }
        .balance-amount { font-size: 24px; font-weight: bold; color: var(--gold); }

        .id-bar { 
            display: flex; 
            margin: 0 15px 15px;
            font-size: 14px; 
            font-weight: bold; 
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .id-num { background: #111; color: var(--electric-blue); padding: 12px; flex: 1.2; text-align: center; border-right: 1px solid var(--border-color); }
        .invite-code { background: #111; color: var(--gold); padding: 12px; flex: 1.5; text-align: center; cursor: pointer; }

        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            margin: 0 15px;
            gap: 15px;
        }
        .menu-item { 
            background: var(--card-bg);
            padding: 25px 10px; 
            text-align: center; 
            text-decoration: none; 
            color: #ccc; 
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .menu-item:active { transform: scale(0.95); background: #222; }

        .icon-circle {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: #111;
            border: 2px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        
        .menu-icon { width: 28px; height: 28px; filter: invert(1); }
        .menu-text { font-size: 16px; font-weight: 600; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.95); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { text-align: center; text-decoration: none; color: #888; font-size: 12px; flex: 1; }
        .nav-icon { width: 24px; height: 24px; display: block; margin: 0 auto 4px; filter: grayscale(1); opacity: 0.6; }
        
        .nav-item.active { color: var(--gold); }
        .nav-item.active .nav-icon { filter: none; opacity: 1; }
        
        .logout-item { color: #ff4444 !important; border-color: rgba(255, 68, 68, 0.3) !important; }
    </style>
</head>
<body>

    <div class="header">আমার বিদ্যুৎ গ্রিড</div>

    <div class="user-card">
        <div class="logo-box">
            <img src="https://cdn-icons-png.flaticon.com/512/10046/10046313.png" alt="Logo">
        </div>
        <div class="balance-info">
            <div class="balance-label">সঞ্চিত শক্তি (ব্যালেন্স)</div>
            <div class="balance-amount" id="userBalance">লোড হচ্ছে...</div>
        </div>
    </div>

    <div class="id-bar">
        <div class="id-num">গ্রিড আইডি <span id="displayID" style="color:white;">-</span></div>
        <div class="invite-code" onclick="copyRefer()">আমন্ত্রণ কোড <span id="displayRefer" style="text-decoration: underline; color:white;">-</span></div>
    </div>

    <div class="menu-grid">
        <a href="withdraw.html" class="menu-item">
            <div class="icon-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/60/60484.png" class="menu-icon">
            </div>
            <div class="menu-text">ভোল্টেজ উত্তোলন</div>
        </a>
        
        <a href="share.html" class="menu-item">
            <div class="icon-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/1059/1059106.png" class="menu-icon">
            </div>
            <div class="menu-text">গ্রিড শেয়ার</div>
        </a>

        <a href="support.html" class="menu-item">
            <div class="icon-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/1034/1034022.png" class="menu-icon">
            </div>
            <div class="menu-text">গ্রাহক সহায়তা</div>
        </a>

        <a href="group.html" class="menu-item">
            <div class="icon-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="menu-icon">
            </div>
            <div class="menu-text">অফিসিয়াল গ্রুপ</div>
        </a>

        <a href="#" class="menu-item logout-item" id="logoutBtn">
            <div class="icon-circle" style="border-color: rgba(255,68,68,0.5);">
                <img src="https://cdn-icons-png.flaticon.com/512/4433/4433027.png" class="menu-icon" style="filter: invert(1) sepia(1) saturate(5) hue-rotate(300deg);">
            </div>
            <div class="menu-text">গ্রিড অফ</div>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" class="nav-icon">
            হোম
        </a>
        <a href="records.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/1024/1024824.png" class="nav-icon">
            রেকর্ডস
        </a>
        <a href="profile.html" class="nav-item active">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" class="nav-icon">
            আমার
        </a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyANWxCdWbcybuY60iSiNYtFfzY8zHKQCmE",
            authDomain: "biddut-grid-2a476.firebaseapp.com",
            databaseURL: "https://biddut-grid-2a476-default-rtdb.firebaseio.com",
            projectId: "biddut-grid-2a476",
            appId: "1:598209087772:web:400dae852569f1b27a52d9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // প্রোফাইল চেক করার মেইন ফাংশন
        function initProfile() {
            let userPhone = localStorage.getItem('userPhone');

            // যদি একদমই ডাটা না থাকে
            if (!userPhone || userPhone === null || userPhone === "null") {
                window.location.replace("login.html");
                return;
            }

            document.getElementById('displayID').innerText = userPhone;

            // ডাটাবেস কানেকশন
            db.ref('users/' + userPhone).on('value', (snapshot) => {
                const balanceText = document.getElementById('userBalance');
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    let currentBalance = (userData.balance !== undefined) ? userData.balance : 150;
                    balanceText.innerText = "৳ " + parseFloat(currentBalance).toFixed(2);
                } else {
                    balanceText.innerText = "৳ ১৫০.০০";
                }
            }, (error) => {
                console.log("Firebase Error:", error);
            });

            // আমন্ত্রণ কোড
            let savedReferCode = localStorage.getItem('referCode_' + userPhone);
            if (!savedReferCode) {
                savedReferCode = Math.floor(100000 + Math.random() * 900000).toString();
                localStorage.setItem('referCode_' + userPhone, savedReferCode);
            }
            document.getElementById('displayRefer').innerText = savedReferCode;
        }

        // পেজ লোড হলে চেক করবে
        window.onload = function() {
            // ০.৫ সেকেন্ড ওয়েট করবে মেমোরি থেকে ডাটা পড়ার জন্য
            setTimeout(initProfile, 100); 
        };

        function copyRefer() {
            let code = document.getElementById('displayRefer').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert("আপনার আমন্ত্রণ কোড কপি হয়েছে: " + code);
            });
        }

        // লগআউট সিস্টেম
        document.getElementById('logoutBtn').onclick = function(e) {
            e.preventDefault();
            if(confirm("আপনি কি গ্রিড অফ (Logout) করতে চান?")) {
                localStorage.removeItem('userPhone');
                window.location.replace("login.html");
            }
        };
    </script>
</body>
</html>
