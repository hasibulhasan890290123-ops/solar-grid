<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অফিসিয়াল গ্রুপ - Official Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #fcc419; 
            --electric-blue: #007bff;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-color: #eee;
            --border-color: #333;
        }
        
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: var(--dark-bg); 
            color: var(--text-color); 
            margin: 0;
            background-image: radial-gradient(circle at 50% 100%, #1a3a5a 0%, var(--dark-bg) 80%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header { 
            display: flex; align-items: center; padding: 15px; 
            border-bottom: 1px solid var(--border-color); 
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
        }
        .back-btn { text-decoration: none; color: var(--gold); font-size: 20px; margin-right: 15px; }
        .header-title { font-size: 18px; font-weight: bold; flex: 1; text-align: center; margin-right: 35px; color: var(--gold); }

        .container { 
            padding: 40px 20px; 
            text-align: center; 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .group-logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
        }

        .group-logo {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 123, 255, 0.6));
            position: relative;
            z-index: 2;
        }

        .pulse {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 2px solid var(--electric-blue);
            border-radius: 50%;
            animation: ripple 2s linear infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        h2 { color: white; margin-bottom: 15px; font-size: 24px; }
        p { color: #aaa; font-size: 15px; margin-bottom: 40px; line-height: 1.6; }

        .join-btn {
            background: linear-gradient(45deg, #0088cc, #00aaff);
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.4);
        }
        .join-btn:active { transform: scale(0.95); }
        
        .tg-small-icon { width: 25px; height: 25px; filter: brightness(0) invert(1); }

        .info-box {
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-color);
            padding: 20px;
            border-radius: 15px;
        }
        .info-box span { color: var(--gold); display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="back-btn">❮</a>
        <div class="header-title">অফিসিয়াল কমিউনিটি</div>
    </div>

    <div class="container">
        <div class="group-logo-wrapper">
            <div class="pulse"></div>
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="group-logo">
        </div>

        <h2>আমাদের টেলিগ্রাম গ্রুপ</h2>
        <p>সবার আগে পেমেন্ট আপডেট এবং নতুন সব ঘোষণা পেতে এখনই নিচের বাটনে ক্লিক করে আমাদের অফিশিয়াল গ্রুপে যোগ দিন।</p>

        <a href="https://t.me/+iO9owGYX-jxlOGRl" target="_blank" class="join-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="tg-small-icon">
            গ্রুপে জয়েন করুন
        </a>

        <div class="info-box">
            <span>কমিউনিটি সুবিধা:</span>
            • অ্যাডমিনদের সাথে সরাসরি কথা বলা<br>
            • প্রতিদিনের পেমেন্ট প্রুফ দেখা<br>
            • নতুন মেম্বারদের জন্য স্পেশাল টিপস
        </div>
    </div>

</body>
</html>
